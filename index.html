<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="manifest" href="site.webmanifest" /> 
    <!-- questo tag mi collega al file web manifest che mi permette di avere più feature nella nostra web app -->
    <link rel="stylesheet" href="style.css">
    <!--
    viewport = finestra a disposizione del browser per mostrare le informazioni
    width=device width significa che il viewport è largo quanto lo schermo del device (quindi dipende da dispositivo a dispositivo)
    questo attributo permette la visualizzazione da mobile, dove il viewport è come lo schermo-->
    <title>Document</title>
</head>
<body>
    <div class="piano">                     <!--creo un div per creare il piano al cui interno avrò altri div figli che costituiranno il pannello e la tastiera-->
        <div class="piano-panel">
            <img src="images/icons8-scooby-doo-50.png" alt ="panel-logo">
        </div>
        <div class="piano-keyboard">
                <div class="key key-white" id="do"></div>
                <div class="key key-black" id="dodiesis"></div>
                <div class="key key-white" id="re"></div>
                <div class="key key-black" id="rediesis"></div>
                <div class="key key-white" id="mi"></div>
                <div class="key key-white" id="fa"></div>
                <div class="key key-black" id="fadiesis"></div>
                <div class="key key-white" id="sol"></div>
                <div class="key key-black" id="soldiesis"></div>
                <div class="key key-white" id="la"></div>
                <div class="key key-black" id="ladiesis"></div>
                <div class="key key-white" id="si"></div>
       </div>


    </div>
    <script src="script.js"></script>
</body>
</html>
